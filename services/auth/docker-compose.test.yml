services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth_service
      POSTGRES_PASSWORD: auth_service
      POSTGRES_DB: auth_service
    ports:
      - '5545:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth_service']
      interval: 2s
      timeout: 2s
      retries: 20
