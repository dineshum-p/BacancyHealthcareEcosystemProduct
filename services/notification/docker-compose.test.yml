services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notification_service
      POSTGRES_PASSWORD: notification_service
      POSTGRES_DB: notification_service
    ports:
      - '5546:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notification_service']
      interval: 2s
      timeout: 2s
      retries: 20
