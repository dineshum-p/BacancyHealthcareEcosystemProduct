services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scheduling_service
      POSTGRES_PASSWORD: scheduling_service
      POSTGRES_DB: scheduling_service
    ports:
      - '5550:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scheduling_service']
      interval: 2s
      timeout: 2s
      retries: 20
