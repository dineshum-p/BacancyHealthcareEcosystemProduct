services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: patient_service
      POSTGRES_PASSWORD: patient_service
      POSTGRES_DB: patient_service
    ports:
      - '5549:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U patient_service']
      interval: 2s
      timeout: 2s
      retries: 20
