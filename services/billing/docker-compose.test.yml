services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: billing_service
      POSTGRES_PASSWORD: billing_service
      POSTGRES_DB: billing_service
    ports:
      - '5548:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U billing_service']
      interval: 2s
      timeout: 2s
      retries: 20
